services:
  pulp-api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://dev:password@pulp-db:5432/pulp_db
      REDIS_URL: redis://pulp-redis:6379
    depends_on:
      pulp-db:
        condition: service_healthy
      pulp-redis:
        condition: service_healthy
    networks:
      - app-network

  pulp-db:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "pulp_db"
      POSTGRES_USER: "dev"
      POSTGRES_PASSWORD: "password"
    volumes:
      - app_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d pulp_db"]
      interval: 10s
      retries: 5
      timeout: 5s
      start_period: 30s
    networks:
      - app-network
    restart: always

  pulp-redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - app_redis_data:/data
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  app_db_data:
  app_redis_data:
